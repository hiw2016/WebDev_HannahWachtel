<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hannah's Baked Goods</title>
    <link rel="stylesheet" type="text/css" href="./css/styles.css" />
    <script type="text/javascript">
      //   hamburger menu
      document.addEventListener("DOMContentLoaded", function () {
        document
          .getElementById("mobile-menu")
          .addEventListener("click", toggleShow);
      });

      function toggleShow() {
        var menu = document.getElementById("menu");
        console.log(menu.classList);
        menu.classList.toggle("show");
      }
    </script>
  </head>
  <body>
    <header>
      <h1 class="brand"><a href="#">Hannah's Baked Goods</a></h1>
      <span class="mobile-menu" id="mobile-menu">&#8801;</span>
      <nav>
        <ul class="menu" id="menu">
          <li><a href="./gallery/gallery.html">Gallery</a></li>
          <li><a href="./about/about.html">About</a></li>
          <li><a href="./order/order.html">Order</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <div class="container">
        <div class="thumb">
          <img src="./img/cookies5.jpeg" alt="Christmas mitten cookies" />
        </div>
        <div class="thumb">
          <img src="./img/cupcakes1.jpeg" alt="Floral cupcakes" />
        </div>
        <div class="thumb">
          <img src="./img/cake7.jpg" alt="Floral birthday cake" />
        </div>
        <div class="thumb">
          <img src="./img/cupcakes2.jpeg" alt="4th of July cupcakes" />
        </div>
        <div class="thumb">
          <img src="./img/cookies4.jpeg" alt="Easter cookies" />
        </div>
      </div>

      <div class="contact">
        <h2>Contact me!</h2>
        <form action="https://formspree.io/f/mnjojzzo" method="POST">
          <div class="row">
            <label for="name" class="label-lg">Name: </label>
            <input type="text" name="name" class="input-lg" required />

            <label for="email" class="label-lg">Email: </label>
            <input type="text" name="email" class="input-lg" required />
          </div>
          <div class="message-area">
            <label for="message">Message:</label>
            <textarea
              name="message"
              class="message"
              placeholder="Type your message here..."
              required
            ></textarea>
          </div>
          <div class="button-bar">
            <button class="btn" type="submit">Send</button>
          </div>
          <input
            type="hidden"
            name="subject"
            value="New submission from {{name}}"
          />
        </form>
      </div>
    </main>
  </body>
</html>
